	<!-- bootstrap version hack -->
	<script>
		const jqueryRealVer = globalThis.jQuery.fn.jquery;
		const jqueryFakeVer = '3.7.1';
		globalThis.jQuery.fn.jquery = jqueryFakeVer;

		const formTypeLabels = {
			'default': 'text', 'number': 'number', 'date': 'date', 'time': 'time', 'datetime-local': 'datetime',
			'month': 'month', 'week': 'week', 'email': 'email', 'tel': 'tel', 'url': 'url', 'search': 'search',
			'password': 'password', 'color': 'color', 'range': 'range', 'file': 'file', 'hidden': 'hidden',
			'textarea': 'textarea', 'checkbox': 'checkbox', 'combo': 'select', 'radio': 'radio',
			'section': 'section', 'divider': 'divider', 'static': 'static', 'spacer': 'spacer',
		};
	</script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- init -->
	<script>
		(function() {
			'use strict';

			// --- Globals ---
			var INPUT_RESULT = [];
			var OUTPUT_RESULT = [];
			var $currentRulesRow = null;

			// --- DOM Refs ---
			var $inputList = $('#inputList');
			var tplInputRow = document.getElementById('tplInputRow').content.querySelector('section');
			var $outputForm = $('#outputForm');

			// --- Utils ---
			function uid() {
				return 'r' + Math.random().toString(36).substr(2, 9);
			}

			function sanitizeKey(name, usedKeys) {
				var key = (name || '').toString().toLowerCase().trim().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
				if (!key) key = 'field';
				var base = key, i = 2;
				while (usedKeys.has(key)) {
					key = `${base}_${i++}`;
				}
				usedKeys.add(key);
				return key;
			}

			function getTypeLabel(type) {
				return formTypeLabels[type] || type;
			}

			function parseRules(jsonStr) {
				try { return JSON.parse(jsonStr || '{}'); } catch (e) { return {}; }
			}

			function stringifyRules(rules) {
				return JSON.stringify(rules || {});
			}

			function saveUrlState() {
				try {
					if (INPUT_RESULT.length) {
						history.replaceState(null, null, `#${btoa(encodeURIComponent(JSON.stringify(INPUT_RESULT)))}`);
					} else {
						history.replaceState(null, null, ' ');
					}
				} catch (e) {}
			}

			function loadUrlState() {
				try {
					var h = location.hash;
					if (h.length > 1) {
						var data = JSON.parse(decodeURIComponent(atob(h.slice(1))));
						if (Array.isArray(data)) {
							INPUT_RESULT = data;
							rebuildInputRows();
							return true;
						}
					}
				} catch (e) {}
				return false;
			}

			// --- Debounce ---
			function debounce(func, wait) {
				var timeout;
				return function() {
					var context = this, args = arguments;
					clearTimeout(timeout);
					timeout = setTimeout(function() {
						func.apply(context, args);
					}, wait);
				};
			}

			var debouncedRender = debounce(function() {
				syncInputState();
				renderOutputForm();
			}, 300);

			function immediateRender() {
				syncInputState();
				renderOutputForm();
			}

			// --- Input Panel: Row Management ---
			function createInputRow(data) {
				data = data || {};
				var $row = $(tplInputRow.cloneNode(true));
				var id = data.id || uid();
				$row.attr('data-id', id);
				$row.find('[name=k]').val(data.k || '');
				$row.find('[name=t]').val(data.t || 'default');
				$row.find('[name=v]').val(data.v || '');
				$row.attr('data-rules', stringifyRules(data.r));
				$row.find('[data-type-label]').text(getTypeLabel(data.t || 'default'));

				if (data.r && Object.keys(data.r).length) {
					$row.addClass('has-rules');
					$row.find('[data-rules-btn]').removeClass('btn-outline-secondary').addClass('btn-info');
				}

				// Events: structural (immediate)
				$row.find('[data-delete]').on('click', function() {
					$row.remove();
					immediateRender();
				});

				$row.find('[data-up]').on('click', function() {
					var $prev = $row.prev();
					if ($prev.length) { $row.insertBefore($prev); immediateRender(); }
				});

				$row.find('[data-down]').on('click', function() {
					var $next = $row.next();
					if ($next.length) { $row.insertAfter($next); immediateRender(); }
				});

				// Events: value changes (debounced)
				$row.find('[name=k], [name=v]').on('input', debouncedRender);
				$row.find('[name=t]').on('change', function() {
					$row.find('[data-type-label]').text(getTypeLabel(this.value));
					debouncedRender();
				});

				// Events: rules modal open
				$row.find('[data-rules-btn]').on('click', function() {
					$currentRulesRow = $row;
					var rules = parseRules($row.attr('data-rules'));
					$('#rule-required').prop('checked', !!rules.required);
					$('#rule-min').val(rules.min !== undefined ? rules.min : '');
					$('#rule-max').val(rules.max !== undefined ? rules.max : '');
					$('#rule-minlength').val(rules.minlength !== undefined ? rules.minlength : '');
					$('#rule-maxlength').val(rules.maxlength !== undefined ? rules.maxlength : '');
					$('#rule-pattern').val(rules.pattern || '');
					$('#rule-step').val(rules.step !== undefined ? rules.step : '');
					$('#rule-multiple').prop('checked', !!rules.multiple);
				});

				return $row;
			}

			function syncInputState() {
				var list = [];
				$inputList.children('.input-row').each(function() {
					var $row = $(this);
					var k = $row.find('[name=k]').val().trim();
					var t = $row.find('[name=t]').val();
					var v = $row.find('[name=v]').val();
					var r = parseRules($row.attr('data-rules'));

					// Validation visual only (don't block render)
					if (!k && t !== 'divider' && t !== 'spacer') {
						$row.find('[name=k]').addClass('is-invalid');
					} else {
						$row.find('[name=k]').removeClass('is-invalid');
					}

					list.push({ id: $row.attr('data-id'), k: k, t: t, v: v, r: r });
				});
				INPUT_RESULT = list;
				saveUrlState();
			}

			function rebuildInputRows() {
				$inputList.empty();
				$.each(INPUT_RESULT, function(i, data) {
					createInputRow(data).appendTo($inputList);
				});
			}

			// --- Output Panel: Render Form ---
			function renderOutputForm() {
				$outputForm.empty();
				var usedKeys = new Set();
				var $currentFieldset = null;

				function appendToContainer($el) {
					if ($currentFieldset) $currentFieldset.append($el);
					else $outputForm.append($el);
				}

				$.each(INPUT_RESULT, function(i, data) {
					var type = data.t;
					var val = data.v || '';
					var rules = data.r || {};

					// --- Non-field elements ---
					if (type === 'section') {
						$currentFieldset = $('<fieldset class="border p-3 rounded mb-3"></fieldset>');
						$currentFieldset.append(`<legend class="w-auto px-2 font-weight-bold">${data.k || 'Section'}</legend>`);
						appendToContainer($currentFieldset);
						return;
					}
					if (type === 'divider') {
						appendToContainer('<hr class="my-3">');
						return;
					}
					if (type === 'spacer') {
						appendToContainer('<div class="my-3"></div>');
						return;
					}
					if (type === 'static') {
						appendToContainer(`<p class="form-text text-muted">${val || data.k || ''}</p>`);
						return;
					}
					if (type === 'hidden') {
						var hname = sanitizeKey(data.k, usedKeys);
						appendToContainer(`<input type="hidden" name="${hname}" value="${val}">`);
						return;
					}

					// --- Form fields ---
					var name = sanitizeKey(data.k, usedKeys);
					var $wrap = $('<div class="form-group row output-field-row align-items-center"></div>');
					appendToContainer($wrap);

					var needsSideLabel = !['checkbox', 'radio'].includes(type);

					if (needsSideLabel) {
						$wrap.append(`<label class="col-sm-3 col-form-label output-label">${data.k || ''}</label>`);
						var $col = $('<div class="col-sm-9"></div>');
						$wrap.append($col);
					} else {
						var $col = $('<div class="col-sm-12"></div>');
						$wrap.append($col);
					}

					var $el;
					switch (type) {
						case 'default':
						case 'text':
							$el = $(`<input type="text" class="form-control" name="${name}" value="${val}">`);
							break;
						case 'number':
						case 'date':
						case 'time':
						case 'datetime-local':
						case 'month':
						case 'week':
						case 'email':
						case 'tel':
						case 'url':
						case 'search':
						case 'password':
							$el = $(`<input type="${type}" class="form-control" name="${name}" value="${val}">`);
							break;
						case 'color':
							$el = $(`<input type="color" class="form-control" name="${name}" value="${val || '#000000'}">`);
							break;
						case 'range':
							$el = $(`<input type="range" class="form-control-range" name="${name}" value="${val || '50'}">`);
							break;
						case 'file':
							$el = $(`<input type="file" class="form-control-file" name="${name}">`);
							break;
						case 'textarea':
							$el = $(`<textarea class="form-control" name="${name}" rows="3"></textarea>`).val(val);
							break;
						case 'checkbox':
							var cbId = uid();
							$el = $(`<div class="form-check"><input class="form-check-input" type="checkbox" name="${name}" value="${val || 'on'}" id="${cbId}"><label class="form-check-label" for="${cbId}">${data.k || ''}</label></div>`);
							break;
						case 'combo':
							$el = $(`<select class="form-control" name="${name}"></select>`);
							var opts = val.split(',').filter(function(o) { return o.trim() !== ''; });
							if (opts.length === 0) opts.push('');
							$.each(opts, function(j, o) {
								var trimmed = o.trim();
								$el.append(`<option value="${trimmed}">${trimmed}</option>`);
							});
							break;
						case 'radio':
							$el = $('<div></div>');
							var ropts = val.split(',').filter(function(o) { return o.trim() !== ''; });
							if (ropts.length === 0) ropts.push('');
							$.each(ropts, function(j, o) {
								var rid = uid();
								var checked = (j === 0) ? ' checked' : '';
								$el.append(`<div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="${name}" value="${o.trim()}" id="${rid}"${checked}><label class="form-check-label" for="${rid}">${o.trim()}</label></div>`);
							});
							break;
						default:
							$el = $(`<input type="text" class="form-control" name="${name}" value="${val}">`);
					}

					// Apply validation rules
					var isGroupType = (type === 'checkbox' || type === 'radio');
					if (!isGroupType) {
						if (rules.required) $el.prop('required', true);
						if (rules.min !== undefined && rules.min !== '') $el.attr('min', rules.min);
						if (rules.max !== undefined && rules.max !== '') $el.attr('max', rules.max);
						if (rules.minlength !== undefined && rules.minlength !== '') $el.attr('minlength', rules.minlength);
						if (rules.maxlength !== undefined && rules.maxlength !== '') $el.attr('maxlength', rules.maxlength);
						if (rules.pattern) $el.attr('pattern', rules.pattern);
						if (rules.step !== undefined && rules.step !== '') $el.attr('step', rules.step);
						if (rules.multiple) {
							if (type === 'file' || type === 'email') $el.prop('multiple', true);
						}
					} else {
						if (rules.required) {
							if (type === 'checkbox') $el.find('input').prop('required', true);
							if (type === 'radio') $el.find('input').first().prop('required', true);
						}
					}

					$col.append($el);
				});
			}

			// --- Event Bindings ---
			$('#btnAdd').on('click', function() {
				createInputRow().appendTo($inputList);
				immediateRender();
			});

			$outputForm.on('submit', function(e) {
				e.preventDefault();
				var result = [];

				var arr = $(this).serializeArray();
				$.each(arr, function(i, item) { result.push(item); });

				$(this).find('input[type="checkbox"]').each(function() {
					if (!this.checked) result.push({ name: this.name, value: '' });
				});

				$(this).find('input[type="file"]').each(function() {
					if (this.files.length) {
						var names = [];
						for (var i = 0; i < this.files.length; i++) names.push(this.files[i].name);
						result.push({ name: this.name, value: names.join(', ') });
					}
				});

				OUTPUT_RESULT = result;
				console.debug('OUTPUT_RESULT:', OUTPUT_RESULT);
				alert('Data tersimpan! Cek console (F12) untuk detail.');
			});

			// Rules Modal Save
			$('#btnSaveRules').on('click', function() {
				if (!$currentRulesRow) return;
				var rules = {};
				if ($('#rule-required').is(':checked')) rules.required = true;
				if ($('#rule-min').val() !== '') rules.min = $('#rule-min').val();
				if ($('#rule-max').val() !== '') rules.max = $('#rule-max').val();
				if ($('#rule-minlength').val() !== '') rules.minlength = parseInt($('#rule-minlength').val(), 10);
				if ($('#rule-maxlength').val() !== '') rules.maxlength = parseInt($('#rule-maxlength').val(), 10);
				if ($('#rule-pattern').val() !== '') rules.pattern = $('#rule-pattern').val();
				if ($('#rule-step').val() !== '') rules.step = $('#rule-step').val();
				if ($('#rule-multiple').is(':checked')) rules.multiple = true;

				$currentRulesRow.attr('data-rules', stringifyRules(rules));
				if (Object.keys(rules).length) {
					$currentRulesRow.addClass('has-rules');
					$currentRulesRow.find('[data-rules-btn]').removeClass('btn-outline-secondary').addClass('btn-info');
				} else {
					$currentRulesRow.removeClass('has-rules');
					$currentRulesRow.find('[data-rules-btn]').removeClass('btn-info').addClass('btn-outline-secondary');
				}
				immediateRender();
			});

			// Init
			if (!loadUrlState()) {
				createInputRow({ k: 'username', t: 'text', v: '' }).appendTo($inputList);
				createInputRow({ k: 'password', t: 'password', v: '' }).appendTo($inputList);
				createInputRow({ k: 'remember', t: 'checkbox', v: '' }).appendTo($inputList);
			}
			immediateRender();

		})();
	</script>
</body>

</html>
