<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone XML Editor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/themes/default-dark/style.min.css" />

    <style>
        /* Custom UI Accents (Purple & Burgundy) */
        :root {
            --bs-primary: #6f42c1;
            --bs-primary-rgb: 111, 66, 193;
            --bs-danger: #800020;
            --bs-danger-rgb: 128, 0, 32;
        }
        
        .btn-primary { background-color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-primary:hover { background-color: #59359a; border-color: #59359a; }
        .btn-outline-primary { color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-outline-primary:hover { background-color: var(--bs-primary); color: white; }
        
        .btn-danger { background-color: var(--bs-danger); border-color: var(--bs-danger); }
        .btn-danger:hover { background-color: #5c0017; border-color: #5c0017; }
        .btn-outline-danger { color: #ff4d6d; border-color: var(--bs-danger); }
        .btn-outline-danger:hover { background-color: var(--bs-danger); color: white; border-color: var(--bs-danger); }

        body { padding-top: 2rem; padding-bottom: 4rem; background-color: #121212; }
        .card { background-color: #1e1e1e; border-color: #333; }
        .card-header { background-color: #181818; border-bottom: 1px solid #333; }
        
        #treeContainer { min-height: 400px; max-height: 650px; overflow-y: auto; background-color: #1a1d20; border: 1px solid #333; border-radius: 0.375rem; padding: 1rem; }
        .jstree-default-dark .jstree-anchor { color: #e9ecef; }
        
        .attr-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        textarea.font-monospace { font-size: 0.875rem; color: #a5b4fc; background-color: #0d1117; }
    </style>
</head>
<body>

<div class="container-fluid px-4">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2 class="mb-0 text-primary fw-bold"><i class="bi bi-braces"></i> XML Editor</h2>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0 text-light">I/O Operations</h5>
            <div class="d-flex gap-2">
                <input type="file" id="xmlFileInput" class="d-none" accept=".xml">
                <button class="btn btn-outline-secondary btn-sm" id="btnUpload"><i class="bi bi-upload"></i> Upload File</button>
                <button class="btn btn-success btn-sm" id="btnDownload"><i class="bi bi-download"></i> Download XML</button>
            </div>
        </div>
        <div class="card-body">
            <div class="form-floating mb-3">
                <textarea class="form-control font-monospace" id="xmlSource" style="height: 180px" placeholder="XML Source Code"></textarea>
                <label for="xmlSource" class="text-muted">XML Source Code</label>
            </div>
            <button class="btn btn-primary w-100" id="btnParse"><i class="bi bi-diagram-3"></i> Parse & Load to Editor</button>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header">
                    <h5 class="mb-0 text-light">Document Tree</h5>
                </div>
                <div class="card-body">
                    <div id="treeContainer"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-8 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-light">Node Editor</h5>
                    <span id="nodeBadge" class="badge bg-primary fs-6">No Selection</span>
                </div>
                
                <div class="card-body d-none" id="editorInterface">
                    <div class="d-flex gap-2 mb-4 pb-3 border-bottom border-secondary">
                        <button class="btn btn-outline-success btn-sm" id="btnAddChild"><i class="bi bi-plus-circle"></i> Add Child Node</button>
                        <button class="btn btn-outline-danger btn-sm" id="btnDeleteNode"><i class="bi bi-trash3"></i> Delete Node</button>
                    </div>

                    <form id="nodeForm">
                        <div id="textContentSection" class="mb-4">
                            <label class="form-label text-light">Text Content</label>
                            <div class="alert alert-warning py-2 mb-2 d-none" id="textContentWarning">
                                <i class="bi bi-exclamation-triangle-fill"></i> <strong>Text disabled:</strong> This node contains child elements. Saving text here would break the XML structure.
                            </div>
                            <textarea class="form-control font-monospace" id="nodeText" rows="3"></textarea>
                        </div>

                        <div class="mb-4 p-3 border border-secondary rounded bg-dark">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <label class="form-label text-light mb-0">Attributes</label>
                                <button type="button" class="btn btn-sm btn-outline-info" id="btnAddAttr"><i class="bi bi-plus"></i> Add Attribute</button>
                            </div>
                            <div id="attrContainer">
                                </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-save"></i> Apply Changes to Memory</button>
                    </form>
                </div>

                <div class="card-body d-flex flex-column align-items-center justify-content-center text-muted" id="editorEmptyState" style="min-height: 300px;">
                    <i class="bi bi-cursor fs-1 mb-2"></i>
                    <p>Select a node from the document tree to begin editing.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/jstree.min.js"></script>

<script>
$(document).ready(function() {
    
    // Core Engine Instances
    const domParser = new DOMParser();
    const xmlSerializer = new XMLSerializer();
    
    // State Management
    let xmlDocument = null;
    let nodeRegistry = {}; // Maps jstree UUIDs to actual XML DOM Elements
    let activeNodeId = null;
    let uuidCounter = 0;

    // --- Parser & Tree Builder ---

    function parseAndLoadXML(xmlString) {
        try {
            xmlDocument = domParser.parseFromString(xmlString, "application/xml");
            
            // DOMParser returns a document with a <parsererror> tag if parsing fails
            if (xmlDocument.getElementsByTagName("parsererror").length > 0) {
                const errText = xmlDocument.getElementsByTagName("parsererror")[0].textContent;
                throw new Error("Invalid XML: " + errText);
            }

            nodeRegistry = {};
            uuidCounter = 0;
            
            const treeData = mapDOMToTree(xmlDocument.documentElement);

            // Re-initialize jstree
            const $tree = $('#treeContainer');
            $tree.jstree('destroy').empty();
            
            $tree.jstree({
                'core': {
                    'data': [treeData],
                    'themes': { 'name': 'default-dark', 'dots': true, 'icons': false },
                    'multiple': false
                }
            });

            $tree.on("select_node.jstree", function (e, data) {
                activateEditor(data.node.id);
            });

            resetEditorUI();

        } catch (error) {
            alert(error.message);
        }
    }

    function mapDOMToTree(xmlElement) {
        uuidCounter++;
        const id = 'xml_node_' + uuidCounter;
        nodeRegistry[id] = xmlElement; 

        let nodeStructure = {
            id: id,
            text: `&lt;${xmlElement.nodeName}&gt;`,
            state: { opened: true }
        };

        const children = $(xmlElement).children(); // jQuery filters out text/comment nodes
        if (children.length > 0) {
            nodeStructure.children = [];
            children.each(function() {
                nodeStructure.children.push(mapDOMToTree(this));
            });
        }
        return nodeStructure;
    }

    // --- Serializer ---

    function syncDOMToSource() {
        if (!xmlDocument) return;
        let rawXML = xmlSerializer.serializeToString(xmlDocument);
        $('#xmlSource').val(formatXML(rawXML));
    }

    // Basic regex-based indenter for readability in the textarea
    function formatXML(xml) {
        let formatted = '';
        let pad = 0;
        xml = xml.replace(/(>)(<)(\/*)/g, '$1\r\n$2$3');
        $.each(xml.split('\r\n'), function(index, node) {
            let indent = 0;
            if (node.match( /.+<\/\w[^>]*>$/ )) { indent = 0; } 
            else if (node.match( /^<\/\w/ )) { if (pad !== 0) { pad -= 1; } } 
            else if (node.match( /^<\w[^>]*[^\/]>.*$/ )) { indent = 1; } 
            else { indent = 0; }
            let padding = '';
            for (let i = 0; i < pad; i++) { padding += '  '; }
            formatted += padding + node + '\r\n';
            pad += indent;
        });
        return formatted.trim();
    }

    // --- UI Controllers ---

    function resetEditorUI() {
        activeNodeId = null;
        $('#editorInterface').addClass('d-none');
        $('#editorEmptyState').removeClass('d-none');
        $('#nodeBadge').text('No Selection');
    }

    function activateEditor(id) {
        activeNodeId = id;
        const domElement = nodeRegistry[id];
        
        $('#editorEmptyState').addClass('d-none');
        $('#editorInterface').removeClass('d-none');
        $('#nodeBadge').text(`<${domElement.nodeName}>`);

        // Business Logic: Check for child elements
        const hasElementChildren = $(domElement).children().length > 0;
        
        if (hasElementChildren) {
            $('#textContentWarning').removeClass('d-none');
            $('#nodeText').val('').prop('disabled', true);
        } else {
            $('#textContentWarning').addClass('d-none');
            // Extract text nodes only (ignore comments/cdata for simplicity)
            let textValue = "";
            $(domElement).contents().filter(function() {
                return this.nodeType === 3; // Text node
            }).each(function() {
                textValue += this.nodeValue;
            });
            $('#nodeText').val(textValue.trim()).prop('disabled', false);
        }

        // Populate Attributes
        $('#attrContainer').empty();
        $.each(domElement.attributes, function(index, attr) {
            renderAttributeRow(attr.name, attr.value);
        });
    }

    function renderAttributeRow(name = '', value = '') {
        const template = `
            <div class="attr-row">
                <input type="text" class="form-control form-control-sm attr-key bg-dark text-light border-secondary" placeholder="Name" value="${name}" required>
                <input type="text" class="form-control form-control-sm attr-val bg-dark text-light border-secondary" placeholder="Value" value="${value}">
                <button type="button" class="btn btn-sm btn-danger btn-remove-attr" title="Delete Attribute"><i class="bi bi-trash"></i></button>
            </div>
        `;
        $('#attrContainer').append(template);
    }

    // --- Event Bindings ---

    // Load / Parse
    $('#btnParse').on('click', function() {
        const source = $('#xmlSource').val();
        if (source.trim() !== "") parseAndLoadXML(source);
    });

    // File Upload
    $('#btnUpload').on('click', () => $('#xmlFileInput').trigger('click'));
    
    $('#xmlFileInput').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            $('#xmlSource').val(evt.target.result);
            parseAndLoadXML(evt.target.result);
        };
        reader.readAsText(file);
        $(this).val('');
    });

    // File Download
    $('#btnDownload').on('click', function() {
        syncDOMToSource();
        const xmlContent = $('#xmlSource').val();
        if(!xmlContent) return;
        
        const blob = new Blob([xmlContent], { type: "application/xml" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = "document.xml";
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url);
    });

    // Dynamic Attribute Controls
    $('#btnAddAttr').on('click', () => renderAttributeRow());
    
    $('#attrContainer').on('click', '.btn-remove-attr', function() {
        $(this).closest('.attr-row').remove();
    });

    // Save Node Mutations
    $('#nodeForm').on('submit', function(e) {
        e.preventDefault();
        if (!activeNodeId) return;

        const domElement = nodeRegistry[activeNodeId];

        // 1. Text Content Mutation (Protected by child-check logic)
        if ($(domElement).children().length === 0) {
            domElement.textContent = $('#nodeText').val();
        }

        // 2. Clear existing attributes in DOM
        while (domElement.attributes.length > 0) {
            domElement.removeAttribute(domElement.attributes[0].name);
        }

        // 3. Inject form attributes to DOM
        $('.attr-row').each(function() {
            const key = $(this).find('.attr-key').val().trim();
            const val = $(this).find('.attr-val').val();
            
            if (key) {
                try {
                    domElement.setAttribute(key, val);
                } catch(err) {
                    alert(`Skipped invalid attribute name: "${key}"`);
                }
            }
        });

        // Trigger Sync
        syncDOMToSource();
        parseAndLoadXML($('#xmlSource').val());
    });

    // Delete Node
    $('#btnDeleteNode').on('click', function() {
        if (!activeNodeId) return;
        
        const domElement = nodeRegistry[activeNodeId];
        
        if (domElement === xmlDocument.documentElement) {
            alert("Root node cannot be deleted.");
            return;
        }

        if (confirm(`Delete <${domElement.nodeName}> and all its descendants?`)) {
            $(domElement).remove(); 
            resetEditorUI();
            syncDOMToSource();
            parseAndLoadXML($('#xmlSource').val());
        }
    });

    // Create Child Node
    $('#btnAddChild').on('click', function() {
        if (!activeNodeId) return;
        const parentElement = nodeRegistry[activeNodeId];
        
        const newTagName = prompt("Enter new tag name:", "item");
        if (!newTagName || newTagName.trim() === "") return;

        try {
            // Validate creation via DOM Document
            const newElement = xmlDocument.createElement(newTagName.trim());
            
            // If parent only had text before, we wipe the text to enforce structured children
            if ($(parentElement).children().length === 0) {
                parentElement.textContent = ''; 
            }
            
            parentElement.appendChild(newElement);
            
            syncDOMToSource();
            parseAndLoadXML($('#xmlSource').val());
            
        } catch (error) {
            alert("Invalid XML tag name. Avoid spaces and special characters.");
        }
    });

    // --- Initialization ---
    // Pre-load with a default template to demonstrate functionality immediately
    const defaultTemplate = `<?xml version="1.0" encoding="UTF-8"?>
<root environment="production">
    <project theme="dark" primaryColor="#6f42c1" accentColor="#800020">
        <name>Gasal Framework</name>
        <version>1.0.0</version>
    </project>
</root>`;
    
    $('#xmlSource').val(defaultTemplate);
    $('#btnParse').trigger('click');

});
</script>
</body>
</html>
