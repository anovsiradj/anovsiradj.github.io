<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8">
	<title>Readme5</title>
	<link rel="icon" href="favicon.svg" type="image/svg">

	<style>
		html,
		body {
			margin: 0px;
			padding: 0px;
		}
	</style>
</head>

<body>
	<select>
		<option value="#/README.md">Readme5</option>
		<option>#/hljs.md</option>
		<option>#/mmjs.md</option>
	</select>

	<script>
		let cache = Date.now()
		let readme = null

		function boot() {
			let el = document.createElement('script');
			el.src = `readme5.js?${cache}`
			el.onload = init
			document.body.appendChild(el)
		}

		function init() {
			readme = new Readme5(null, {
				cache,
				menu: document.querySelector('select'),
				/*
				files: [
					{ text: 'Readme5', link: '#/README.md' },
					'#/hljs.md',
					'#/mmjs.md',
				],
				*/
			})
			readme.init('README.md')
		}

		window.addEventListener('DOMContentLoaded', boot, false)
	</script>
</body>

</html>
