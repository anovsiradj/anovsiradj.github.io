<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8" />
	<link rel="icon" href="favicon.svg" type="image/svg">
	<title>Readme5</title>
</head>

<body>
	<main id="elem"></main>

	<script>
		let cache = Date.now()
		let readme = null

		function boot() {
			let el = document.createElement('script');
			el.src = `readme5.js?${cache}`
			el.onload = init
			document.body.appendChild(el)
		}

		function init() {
			readme = new Readme5('elem', {
				cache,
			})
			readme.vendor.js.highlight_dart = 'https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/languages/dart.min.js'

			readme.init('README.md')
		}

		window.addEventListener('DOMContentLoaded', boot, false)
	</script>
</body>

</html>
