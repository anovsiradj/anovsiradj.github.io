<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8" />
	<link rel="icon" href="favicon.svg" type="image/svg">
	<title>Readme5</title>
</head>

<body>
	<div id="readme"></div>

	<script>
		let cache = Date.now()
		let readme = null

		function boot() {
			let el = document.createElement('script');
			el.src = `readme5.js?${cache}`
			el.onload = init
			document.body.appendChild(el)
		}

		function init() {
			readme = new Readme5('readme', {
				spa: true
			})
			readme.init(`README.md`)
		}

		window.addEventListener('DOMContentLoaded', boot, false)
	</script>
</body>

</html>
